<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="./images/android-chrome-512x512.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Patua+One&display=swap" rel="stylesheet" />
  <!-- font awesome icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Google Analytics - Global site tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G6MMLWSB6D"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());
    gtag("config", "G-G6MMLWSB6D");
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Using './sw.js' ensures it looks in the current directory
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered!', reg))
          .catch(err => console.log('SW Failed:', err));
      });
    }
  </script>

  <!-- Style sheets -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="animations.css" />

  <title>Timetable — SLIIT</title>
</head>

<body>
  <div id="message-content"></div>

  <!-- splash screen -->
  <section class="splash" id="splash-section">
    <div class="wrapper">
      <img class="loading-img" src="./images/loading logo low_res.png" alt="" />
      <p class="text">Loading...</p>
      <br /><br />
      <p>
        Seeing a problem? <br />
        Please submit an issue

        <a href="https://github.com/pawan-live/timetable-app/issues">here</a>
      </p>
      <p class="loading-footer-notice">
        This application is not affiliated or supported by SLIIT.<br />Made
        possible entirely by student contributions ❤️
      </p>
    </div>
  </section>

  <!-- login section -->
  <section class="login" id="login-section">
    <div class="wrapper">
      <img class="login-logo" src="./images/app-icon-png-1.png" alt="" />
      <h2 class="logo-title">timetable</h2>
      <p class="lec-hall subheading">Timetable — SLIIT</p>

      <div class="notif-area" id="login-notif-area"></div>

      <div class="separator" style="display: none"></div>
      <input type="text" placeholder="Enter your name" id="username-field" />

      <button class="btn continue-btn" id="continue-btn">
        Continue<i class="icon fa-solid fa-arrow-right"></i>
      </button>
    </div>
  </section>

  <!-- select class section -->
  <section class="details" id="details-section">
    <div class="wrapper">
      <h2>Please select below</h2>
      <p>You only need to do this once 😁</p>
      <div class="notif-area" id="details-notif-area"></div>
      <!-- faculty -->
      <div class="group">
        <label for="select-fac">Faculty: </label>
        <select id="select-fac">
          <option value="0">Select</option>
          <option value="Computing">Computing</option>
          <option value="Business">Business</option>
        </select>
      </div>
      <!-- year of study -->
      <div class="group">
        <label for="select-year">Year of study: </label>
        <select id="select-year" disabled>
          <option value="0">Select</option>
        </select>
      </div>

      <!-- semester -->
      <div class="group">
        <label for="select-sem"><span id="select-sem-label">Semester</span>:
        </label>
        <select id="select-1" disabled>
          <option value="0">Select</option>
        </select>
      </div>

      <!-- specialization -->
      <div class="group">
        <label for="select-sem"><span id="select-spec-label">Specialization</span>:
        </label>
        <select id="select-2" disabled>
          <option value="0">Select</option>
        </select>
      </div>

      <!-- main group -->
      <div class="group">
        <label for="select-main-group">Main Group: </label>
        <select id="select-main-group" disabled>
          <option value="0">Select</option>
        </select>
      </div>

      <!-- subgroup -->
      <div class="group">
        <label for="select-3">Subgroup: </label>
        <select id="select-3" disabled>
          <option value="0">Select</option>
          <option value="01">1</option>
          <option value="02">2</option>
        </select>
      </div>

      <!-- button -->
      <button class="btn continue-btn" id="details-continue-btn">
        Continue<i class="icon fa-solid fa-arrow-right"></i>
      </button>
      <p class="text back-btn" id="details-back-btn">
        <i class="icon fa-solid fa-arrow-left"></i>Back
      </p>
    </div>
  </section>

  <!-- main section -->
  <!-- hidden to avoid loading first -->
  <section class="main" id="main-section">
    <div class="wrapper">
      <div class="card greeting" id="card-greeting">
        <div class="row">
          <div class="greeting-text">
            <p class="text">Hi <span id="greeting-username"></span>,</p>
            <p class="text"><span id="greeting-wish"></span>!</p>
          </div>
          <div id="dark-mode-toggle" class="mode-toggle">
            <i class="fa-solid fa-moon"></i>
          </div>
        </div>
        <div class="row" id="greeting-time-row">
          <p class="text">
            <span id="greeting-time">...</span>
          </p>
        </div>
      </div>

      <div class="navigation">
        <div class="nav-btn" id="left-nav-icon">
          <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div id="date-display">Today</div>
        <div class="nav-btn" id="right-nav-icon">
          <i class="fa-solid fa-chevron-right"></i>
        </div>
      </div>
      <!-- <div class="notice-container">
          <div class="notice">
            <div class="notice-head">
              <h3 class="notice-title">Links enabled! ✅ 😃</h3> -->
      <!-- <h3>✅</h3> -->
      <!-- </div>
            <div class="notice-body">
              <b> Click on the <i class="fa-solid fa-link"></i> button </b> to
              join meeting if available. Please note that it will take some time
              for all links to be added... 🙈
            </div>
          </div>
        </div> -->

      <div class="cards" id="cards-container"></div>

      <div class="controls">
        <p class="text back-btn" id="main-back-btn">
          <i class="fa-solid fa-arrow-left"></i>
        </p>

        <a class="footer-link" href="./about.html">
          <i class="fa-solid fa-circle-info"></i> About
        </a>

        <p class="text" id="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i>
        </p>
      </div>
    </div>
  </section>
  <script>
    // Execute logic once the window has fully loaded
    window.addEventListener('load', () => {
      // Check if the browser supports Service Workers
      if ('serviceWorker' in navigator) {
        // Wait for the Service Worker to be active and ready to handle notifications
        navigator.serviceWorker.ready.then(() => {
          setTimeout(() => {
            askNotificationPermission();
          }, 1500); // 1.5s delay to avoid being blocked by browser anti-spam policies
        });
      }
    });

    //Requests permission from the user to send push notifications
    function askNotificationPermission() {
      // Exit if the browser doesn't support the Notification API
      if (!("Notification" in window)) return;

      // If permission hasn't been asked yet ('default')
      if (Notification.permission === "default") {
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            handleNotificationLogic();
          }
        });
      }
      // If permission was already granted in a previous session
      else if (Notification.permission === "granted") {
        handleNotificationLogic();
      }
    }

    //Decides which notification to send based on user history
    function handleNotificationLogic() {
      // Check LocalStorage to see if the 'hasVisitedBefore' flag exists
      const hasVisited = localStorage.getItem('hasVisitedBefore');

      // Get today's date as a string (e.g., "2026-03-21")
      const today = new Date().toISOString().split('T')[0];
      const lastNotificationDate = localStorage.getItem('lastNotificationDate');

      console.log("Has visited before:", hasVisited); // Debugging line

      if (!hasVisited) {
        welcomeNotification();
        localStorage.setItem('hasVisitedBefore', 'true');
      } else if (lastNotificationDate !== today) {
        // CASE: RETURNING USER + FIRST TIME TODAY
        loginAleart();
        // Update the storage to today's date
        localStorage.setItem('lastNotificationDate', today);
      } else {
        console.log("Notification already sent today.");
      }
    }

    //Sends the 'First Time' Welcome Notification.
    function welcomeNotification() {
      navigator.serviceWorker.ready.then(registration => {
        registration.showNotification('SLIIT Timetable', {
          body: 'Welcome! Notifications are now active.',
          icon: './images/android-chrome-512x512.png',
          badge: './images/favicon.ico',
          vibrate: [200, 100, 200],
          tag: 'welcome-msg'
        });
      });
    }

    //Sends the 'Returning User' Test Notification
    function loginAleart() {
      navigator.serviceWorker.ready.then(registration => {
        registration.showNotification('SLIIT Timetable', {
          body: 'Disclaimer: This schedule is provided as-is. We assume no responsibility for its accuracy.',
          icon: './images/android-chrome-512x512.png',
          badge: './images/favicon.ico',
          vibrate: [200, 100, 200],
          // Changing the tag to include a timestamp forces a NEW notification
          tag: 'daily-disclaimer'
        });
      });
    }
  </script>
  <style>
    /* Initial values */
    #login-section,
    #details-section,
    #main-section {
      display: none;
    }
  </style>

  <!-- JS files -->
  <script src="./functions.js"></script>
  <script src="main.js"></script>
</body>

</html>
